name: Weekly Gong Analysis

on:
  schedule:
    - cron: '0 17 * * 5'  # Every Friday 1pm ET (5pm UTC / EDT)
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GONG_ACCESS_KEY: ${{ secrets.GONG_ACCESS_KEY }}
          GONG_ACCESS_SECRET: ${{ secrets.GONG_ACCESS_SECRET }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_CATALOG_DB_ID: ${{ secrets.NOTION_CATALOG_DB_ID }}
        run: python3 analyze.py

      - name: Commit updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json gong_report.html docs_cache.json
          git diff --staged --quiet || git commit -m "chore: weekly report $(date -u +%Y-%m-%d)"
          git push
